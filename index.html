<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>34 Forex Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0c10;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #ff4d4d;
            --text: #ffffff;
        }

        [data-theme="light"] {
            --bg: #f0f2f5;
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.1);
            --text: #1a1a1a;
            --accent: #d32f2f;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Арын фон зураг (Таны явуулсан зураг) */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1614332287897-cdc485fa562d?q=80&w=2070&auto=format&fit=crop') no-repeat center center/cover;
            filter: blur(50px) brightness(0.4);
            z-index: -1;
            transition: 0.5s;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .logo { font-size: 24px; font-weight: 700; margin-bottom: 40px; }
        .logo span { color: var(--accent); }

        .nav-item {
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
            border: 1px solid transparent;
            color: #888;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--glass);
            border-color: var(--glass-border);
            color: #fff;
        }

        /* CONTENT */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }

        .page-section { display: none; animation: fadeIn 0.5s ease; }
        .page-section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* POST & CALENDAR CARDS */
        .card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .day-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            aspect-ratio: 1/1;
            border-radius: 12px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            transition: 0.2s;
        }

        .day-card:hover { background: var(--glass); transform: scale(1.05); }
        .profit { color: #10b981; font-weight: bold; }
        .loss { color: #ef4444; font-weight: bold; }

        /* TOP NAV */
        .top-nav {
            position: absolute; top: 20px; right: 40px; display: flex; gap: 10px; z-index: 50;
        }

        .toggle-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body data-theme="dark">

    <div class="bg-overlay"></div>

    <div class="top-nav">
        <button class="toggle-btn" onclick="toggleLang()" id="langBtn">MN</button>
        <button class="toggle-btn" onclick="toggleTheme()" id="themeBtn">Dark</button>
    </div>

    <div class="sidebar">
        <div class="logo">34 <span>FOREX</span></div>
        <div class="nav-item active" id="nav-home" onclick="showPage('home')">
            <span>🏠</span> <span class="ln" data-mn="Нүүр хуудас" data-en="Home">Нүүр хуудас</span>
        </div>
        <div class="nav-item" id="nav-report" onclick="showPage('report')">
            <span>📅</span> <span class="ln" data-mn="Тайлан" data-en="Report">Тайлан</span>
        </div>
        <div class="nav-item"><span>🎓</span> <span class="ln" data-mn="Сургалт" data-en="Academy">Сургалт</span></div>
        <div class="nav-item"><span>📡</span> <span class="ln" data-mn="Дохио" data-en="Signals">Дохио</span></div>
    </div>

    <div class="main-content">
        
        <div id="home-page" class="page-section active">
            <h2 class="ln" data-mn="Арилжаачдын талбар" data-en="Traders Feed">Арилжаачдын талбар</h2>
            <div class="card">
                <div style="display:flex; gap:15px; align-items:center; margin-bottom:15px;">
                    <div style="width:40px; height:40px; background:var(--accent); border-radius:50%;"></div>
                    <b>Б. Бат-Эрдэнэ</b>
                </div>
                <p>Gold дээр өнөөдөр маш гоё Buy Setup харагдаж байна. Liquidity sweep хийгдлээ.</p>
                <div style="width:100%; height:200px; background:#111; border-radius:10px; margin-top:10px; border:1px dashed #333; display:flex; align-items:center; justify-content:center; color:#555;">
                    TradingView Chart Image Here
                </div>
            </div>
        </div>

        <div id="report-page" class="page-section">
            <h2 class="ln" data-mn="Арилжааны тайлан (4-р сар)" data-en="Trading Report (April)">Арилжааны тайлан (4-р сар)</h2>
            <div class="calendar-grid" id="calendar">
                </div>
        </div>

    </div>

    <script>
        // ХУУДАС СОЛИХ ФУНКЦ
        function showPage(pageName) {
            // Бүх хуудсыг нуух
            document.getElementById('home-page').classList.remove('active');
            document.getElementById('report-page').classList.remove('active');
            
            // Цэсний идэвхийг арилгах
            document.getElementById('nav-home').classList.remove('active');
            document.getElementById('nav-report').classList.remove('active');

            // Сонгосон хуудсыг харуулах
            document.getElementById(pageName + '-page').classList.add('active');
            document.getElementById('nav-' + pageName).classList.add('active');
        }

        // ХУАНЛИ ҮҮСГЭХ
        const calendar = document.getElementById('calendar');
        for (let i = 1; i <= 30; i++) {
            const isProfit = Math.random() > 0.5;
            const amount = (Math.random() * 100).toFixed(0);
            const day = document.createElement('div');
            day.className = 'day-card';
            day.innerHTML = `
                <span style="font-size:12px; opacity:0.5;">${i}</span>
                <span class="${isProfit ? 'profit' : 'loss'}">${isProfit ? '+' : '-'}${amount}P</span>
            `;
            calendar.appendChild(day);
        }

        // ХЭЛ СОЛИХ
        function toggleLang() {
            const btn = document.getElementById('langBtn');
            const isMN = btn.innerText === 'MN';
            btn.innerText = isMN ? 'EN' : 'MN';
            document.querySelectorAll('.ln').forEach(el => {
                el.innerText = isMN ? el.getAttribute('data-en') : el.getAttribute('data-mn');
            });
        }

        // DARK/LIGHT MODE
        function toggleTheme() {
            const body = document.body;
            const isDark = body.getAttribute('data-theme') === 'dark';
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('themeBtn').innerText = isDark ? 'Light' : 'Dark';
        }
    </script>
</body>
</html>
