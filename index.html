<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>34 Forex Elite | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0c10;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #ff4d4d;
            --text: #ffffff;
        }

        [data-theme="light"] {
            --bg: #f0f2f5;
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.1);
            --text: #1a1a1a;
            --accent: #d32f2f;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Арын фон зураг (Blur) */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://raw.githubusercontent.com/_your_image_path_') no-repeat center center/cover;
            filter: blur(40px) brightness(0.4);
            z-index: -1;
            transition: 0.5s;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
        }

        .nav-item {
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--glass);
            border-color: var(--glass-border);
        }

        /* HEADER & SETTINGS */
        .top-nav {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            padding: 20px;
            position: absolute;
            top: 0; right: 0; width: 100%;
            z-index: 10;
        }

        .toggle-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            font-size: 13px;
        }

        /* CALENDAR SECTION (REPORT) */
        .main-content {
            flex: 1;
            padding: 80px 40px 40px 40px;
            overflow-y: auto;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .day-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            aspect-ratio: 1/1;
            border-radius: 15px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            transition: 0.2s;
        }

        .day-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.1); }

        .profit { color: #10b981; font-weight: bold; font-size: 14px; }
        .loss { color: #ef4444; font-weight: bold; font-size: 14px; }
        .day-num { font-size: 12px; opacity: 0.5; }

        /* MODAL (Тэмдэглэл харах) */
        #note-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 400px; background: var(--bg);
            border: 1px solid var(--accent);
            padding: 30px; border-radius: 20px; z-index: 100;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body data-theme="dark">

    <div class="bg-overlay"></div>

    <div class="top-nav">
        <button class="toggle-btn" onclick="toggleLang()" id="langBtn">Mongolia (MN)</button>
        <button class="toggle-btn" onclick="toggleTheme()" id="themeBtn">Dark Mode</button>
    </div>

    <div class="sidebar">
        <h2 style="margin-left: 15px;">34 <span style="color: var(--accent);">FOREX</span></h2>
        <div class="nav-item" onclick="showSection('feed')"><span>🏠</span> <span class="ln" data-mn="Нүүр хуудас" data-en="Home">Нүүр хуудас</span></div>
        <div class="nav-item active" onclick="showSection('report')"><span>📅</span> <span class="ln" data-mn="Тайлан" data-en="Report">Тайлан</span></div>
        <div class="nav-item"><span>🎓</span> <span class="ln" data-mn="Сургалт" data-en="Academy">Сургалт</span></div>
        <div class="nav-item"><span>📡</span> <span class="ln" data-mn="Дохио" data-en="Signals">Дохио</span></div>
    </div>

    <div class="main-content" id="report-section">
        <h2 class="ln" data-mn="4-р сарын тайлан" data-en="April Report">4-р сарын тайлан</h2>
        
        <div class="calendar-grid" id="calendar">
            </div>
    </div>

    <div id="note-modal">
        <h3 id="modal-date">2026.04.15</h3>
        <p id="modal-profit" class="profit">+50 Pips ($120)</p>
        <p style="color: #888; line-height: 1.6;">Сургамж: RSI overbought байх үед хүлээцтэй байж, supply zone дээр баталгаажуулалт авч орсон нь зөв байлаа.</p>
        <button class="toggle-btn" style="width: 100%; margin-top: 20px;" onclick="closeModal()">Хаах</button>
    </div>

    <script>
        // Theme & Lang Toggle
        function toggleTheme() {
            const body = document.body;
            const isDark = body.getAttribute('data-theme') === 'dark';
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('themeBtn').innerText = isDark ? 'Light Mode' : 'Dark Mode';
        }

        function toggleLang() {
            const btn = document.getElementById('langBtn');
            const isMN = btn.innerText.includes('MN');
            btn.innerText = isMN ? 'English (EN)' : 'Mongolia (MN)';
            
            document.querySelectorAll('.ln').forEach(el => {
                el.innerText = isMN ? el.getAttribute('data-en') : el.getAttribute('data-mn');
            });
        }

        // Хуанли үүсгэх
        const calendar = document.getElementById('calendar');
        for (let i = 1; i <= 30; i++) {
            const day = document.createElement('div');
            day.className = 'day-card';
            
            // Дурын өгөгдөл оруулав (Жишээ)
            const isProfit = Math.random() > 0.4;
            const amount = (Math.random() * 100).toFixed(0);
            
            day.innerHTML = `
                <span class="day-num">${i}</span>
                <span class="${isProfit ? 'profit' : 'loss'}">${isProfit ? '+' : '-'}${amount} P</span>
                <span style="font-size: 10px; opacity: 0.6;">0.50 Lot</span>
            `;
            
            day.onclick = () => showModal(i, isProfit, amount);
            calendar.appendChild(day);
        }

        function showModal(day, isProfit, amount) {
            document.getElementById('modal-date').innerText = `2026.04.${day}`;
            document.getElementById('modal-profit').innerText = `${isProfit ? '+' : '-'}${amount} Pips`;
            document.getElementById('modal-profit').className = isProfit ? 'profit' : 'loss';
            document.getElementById('note-modal').style.display = 'block';
        }

        function closeModal() { document.getElementById('note-modal').style.display = 'none'; }
    </script>
</body>
</html>
